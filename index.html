<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아띠벨로 - ㅇㅇㅇ 추가주문하기</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Open Graph -->
    <meta
      name="keywords"
      content="추가주문서, 주문서, 아띠벨로, 아동복주문, 라이브주문, 간편주문"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:url"
      content="https://siyoonagain.github.io/manage_atti/"
    />
    <meta property="og:title" content="추가 주문서 | manage_atti" />
    <meta
      property="og:description"
      content="상품 선택 후 빠르게 추가 주문이 가능한 아띠벨로 추가 주문 페이지입니다. 무료배송 기준도 한눈에 확인해보세요."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://siyoonagain.github.io/manage_atti/img/og_image.jpg"
    />
    <meta property="og:site_name" content="manage_atti" />
    <meta property="og:locale" content="ko_KR" />
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">아띠벨로 - ㅇㅇㅇ 추가주문하기</h1>
      <div class="user-box">
        <div class="item">
          <label class="label">주문자 이름</label>
          <input type="text" id="userName" placeholder="홍길동" />
        </div>

        <div class="item">
          <label class="label">아이디</label>
          <input type="text" id="userId" placeholder="abcd1234" />
        </div>
      </div>

      <div class="card">
        <div id="orderList"></div>

        <button id="AddBtn" type="button" class="btn-add">+ 상품 추가</button>
        <!-- 개인정보 수집 및 이용 동의 -->
        <div class="agree-box">
          <label class="agree-label">
            <input type="checkbox" id="agreeChk" checked />
            개인정보 수집 및 이용에 동의합니다. (필수)
          </label>

          <div class="agree-text">
            수집항목 : 이름, 아이디, 주문정보<br />
            이용목적 : 주문 확인 및 고객 응대<br />
            보관기간 : 주문 완료 후 3개월 보관 후 파기
          </div>
        </div>
        <button id="previewOrder" type="button" class="btn-submit">
          주문하기
        </button>
      </div>
    </div>

    <!-- 팝업 -->
    <div class="dim" id="popup">
      <div class="popup">
        <div class="pop-title">주문 내역 확인</div>

        <div class="pop-list" id="popList"></div>

        <div class="total" id="totalPrice"></div>

        <div class="pop-btns">
          <button id="cancel" class="cancel">취소</button>
          <button id="confirm" class="confirm">제출하기</button>
        </div>
      </div>
    </div>

    <!-- 제출 로딩 팝업 -->
    <div class="loading" id="loading">
      <div class="loading-box">
        <div class="spinner"></div>
        <div class="loading-text">주문 넣는 중입니다...</div>
      </div>
    </div>
    <!-- 토스트 알림 -->
    <div id="toast"></div>
    <script src="./js/products.js"></script>
    <script src="./js/function.js"></script>
  </body>
</html>
